name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        # Installs deps, runs `astro build`, and uploads the Pages artifact.
        # `path` defaults to ./dist (our build output).
        uses: withastro/action@v3
        with:
          # Astro 7 requires Node >=22.12.0.
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
